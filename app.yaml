# Wind Turbine Analytics - Databricks App Configuration

# Command to start the app
command:
  - python
  - run_app.py

# Environment variables
env:
  - name: VOLUME_PATH
    value: /tmp/wind_analytics_data
  - name: OTEL_SERVICE_NAME
    value: wind-analytics
  - name: OTEL_TRACES_EXPORTER
    value: otlp
  - name: OTEL_METRICS_EXPORTER
    value: otlp
  - name: OTEL_LOGS_EXPORTER
    value: otlp
